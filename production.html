<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/lyffin-ops/manifest.json">
<meta name="theme-color" content="#1a1a18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lyffin Ops">
<link rel="apple-touch-icon" href="/lyffin-ops/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lyffin Ops — Production</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1a18;--ink-2:#4a4a46;--ink-3:#9a9890;--surface:#f7f6f2;--surface-2:#eeecea;--border:#dddbd5;--gold:#b89a6a;--gold-lt:rgba(184,154,106,0.12);--white:#ffffff;--radius:6px;--sidebar-w:220px;--font-sans:'Inter',system-ui,sans-serif;--font-disp:'Playfair Display',Georgia,serif}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@500;600&display=swap');
body{font-family:var(--font-sans);background:var(--surface);color:var(--ink);min-height:100vh;display:flex}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--ink);display:flex;flex-direction:column;flex-shrink:0;position:fixed;left:0;top:0;bottom:0}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.07)}
.sidebar-logo-name{font-family:var(--font-disp);font-size:18px;font-weight:600;color:var(--white)}
.sidebar-logo-sub{font-size:10px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.sidebar-nav{flex:1;padding:16px 10px;display:flex;flex-direction:column;gap:2px}
.nav-section{font-size:10px;font-weight:500;color:rgba(255,255,255,0.25);letter-spacing:.1em;text-transform:uppercase;padding:12px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:5px;font-size:13.5px;color:rgba(255,255,255,0.55);cursor:pointer;text-decoration:none;transition:background .12s,color .12s}
.nav-item:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85)}
.nav-item.active{background:rgba(184,154,106,0.18);color:var(--gold)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.sidebar-user{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:rgba(184,154,106,0.25);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--gold);flex-shrink:0}
.user-name{font-size:13px;font-weight:500;color:rgba(255,255,255,0.8)}
.user-role{font-size:11px;color:rgba(255,255,255,0.3);text-transform:capitalize}
.btn-signout{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.25);padding:4px;border-radius:4px;display:flex;align-items:center;transition:color .12s;margin-left:auto}
.btn-signout:hover{color:rgba(255,255,255,0.6)}
.btn-signout svg{width:15px;height:15px}
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-title{font-family:var(--font-disp);font-size:18px;font-weight:500}
.topbar-actions{display:flex;align-items:center;gap:10px}
.filter-select{height:36px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font-sans);color:var(--ink-2);background:var(--white);cursor:pointer;outline:none}
.btn{height:36px;padding:0 16px;border-radius:var(--radius);font-size:13px;font-weight:500;font-family:var(--font-sans);cursor:pointer;border:none;transition:all .12s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--ink);color:var(--white)}
.btn-primary:hover{background:#2e2e2a}
.btn-ghost{background:transparent;color:var(--ink-2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface-2)}
.btn svg{width:14px;height:14px}
.content{padding:28px 32px;flex:1}
.projects-grid{display:flex;flex-direction:column;gap:20px}
.project-card{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.project-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--surface-2)}
.project-name{font-weight:500;font-size:15px}
.project-meta{font-size:12px;color:var(--ink-3);margin-top:2px}
.progress-wrap{display:flex;align-items:center;gap:10px}
.progress-bar-bg{width:120px;height:4px;background:var(--surface-2);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}
.progress-text{font-size:12px;color:var(--ink-3);white-space:nowrap}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:500}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.badge-structure{background:#fef3cd;color:#92400e}.badge-structure::before{background:#d97706}
.badge-polish{background:#dbeafe;color:#1e40af}.badge-polish::before{background:#3b82f6}
.badge-packing{background:#d1fae5;color:#065f46}.badge-packing::before{background:#10b981}
.badge-ready{background:#dcfce7;color:#14532d}.badge-ready::before{background:#22c55e}
.badge-carpentry{background:#fef3cd;color:#92400e}.badge-carpentry::before{background:#d97706}
.items-table{width:100%;border-collapse:collapse;font-size:13.5px}
.items-table th{padding:9px 16px;text-align:left;font-size:11px;font-weight:500;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;background:var(--surface);border-bottom:1px solid var(--border)}
.items-table td{padding:12px 16px;border-bottom:1px solid var(--surface-2);vertical-align:middle}
.items-table tr:last-child td{border-bottom:none}
.item-name{font-weight:500;font-size:14px}
.item-meta{font-size:12px;color:var(--ink-3);margin-top:2px}
.stages{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.sp{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:500;font-family:var(--font-sans);cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--ink-3);transition:all .15s;white-space:nowrap}
.sp:hover{border-color:var(--ink-3);color:var(--ink-2)}
.sp:active{transform:scale(0.97)}
.sp:disabled{cursor:not-allowed;opacity:0.6}
.sp.started-carpentry,.sp.started-structure{background:#fff7ed;color:#c2410c;border-color:#f97316}
.sp.started-polish{background:#eff6ff;color:#1d4ed8;border-color:#93c5fd}
.sp.started-upholstery{background:#f0f9ff;color:#0369a1;border-color:#7dd3fc}
.sp.started-packing{background:#f0fdf4;color:#15803d;border-color:#86efac}
.sp.done-carpentry,.sp.done-structure{background:#fef3cd;color:#92400e;border-color:#d97706}
.sp.done-polish{background:#dbeafe;color:#1e40af;border-color:#3b82f6}
.sp.done-upholstery{background:#e0f2fe;color:#075985;border-color:#0ea5e9}
.sp.done-packing{background:#d1fae5;color:#065f46;border-color:#10b981}
.sp.done-ready{background:#dcfce7;color:#14532d;border-color:#22c55e}
/* Supervisor approve button */
.sp-approve{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:500;font-family:var(--font-sans);cursor:pointer;border:1.5px solid #16a34a;background:#f0fdf4;color:#16a34a;transition:all .15s;white-space:nowrap}
.sp-approve:hover{background:#dcfce7}
.sp-approve:disabled{cursor:not-allowed;opacity:0.5}
/* Awaiting approval indicator */
.awaiting-approval{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;color:#d97706;background:#fef3cd;border:1px solid #d97706;white-space:nowrap}
.overall-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:500}
.overall-badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.ob-structure{background:#fef3cd;color:#92400e}.ob-structure::before{background:#d97706}
.ob-structure-started{background:#fff7ed;color:#c2410c}.ob-structure-started::before{background:#f97316}
.ob-polish-started{background:#eff6ff;color:#1d4ed8}.ob-polish-started::before{background:#93c5fd}
.ob-upholstery-started{background:#f0f9ff;color:#0369a1}.ob-upholstery-started::before{background:#7dd3fc}
.ob-packing-started{background:#f0fdf4;color:#15803d}.ob-packing-started::before{background:#86efac}
.ob-polish{background:#dbeafe;color:#1e40af}.ob-polish::before{background:#3b82f6}
.ob-upholstery{background:#e0f2fe;color:#075985}.ob-upholstery::before{background:#0ea5e9}
.ob-packing{background:#d1fae5;color:#065f46}.ob-packing::before{background:#10b981}
.ob-ready{background:#dcfce7;color:#14532d}.ob-ready::before{background:#22c55e}
.empty-state{text-align:center;padding:60px 32px;color:var(--ink-3);font-size:14px}
.page-loading{position:fixed;inset:0;background:var(--surface);display:flex;align-items:center;justify-content:center;z-index:999}
.spin-lg{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.chevron{width:16px;height:16px;transition:transform .2s;flex-shrink:0;color:var(--ink-3)}
.chevron.open{transform:rotate(180deg)}
.items-wrap{display:none}
.items-wrap.open{display:block}
.project-header{cursor:pointer;transition:background .1s}
.project-header:hover{background:var(--surface)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--white);padding:10px 16px;border-radius:var(--radius);font-size:13px;z-index:200;transform:translateY(80px);opacity:0;transition:all .25s ease}
.toast.show{transform:translateY(0);opacity:1}
/* Remark row */
.remark-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.remark-input{flex:1;padding:5px 9px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;font-family:var(--font-sans);outline:none;color:var(--ink);background:var(--white);transition:border-color .12s}
.remark-input:focus{border-color:var(--gold)}
.remark-saved{font-size:11px;color:var(--ink-3);font-style:italic;margin-top:4px}
/* Audit trail tooltip */
.audit-info{font-size:10px;color:var(--ink-3);margin-top:3px}
/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:none;align-items:center;justify-content:center;padding:24px}
.modal-backdrop.open{display:flex}
.modal{background:var(--white);border-radius:10px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-header{padding:22px 26px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:var(--font-disp);font-size:20px;font-weight:500}
.modal-close{background:none;border:none;cursor:pointer;color:var(--ink-3);padding:4px;border-radius:4px;display:flex;align-items:center}
.modal-close:hover{color:var(--ink)}
.modal-close svg{width:18px;height:18px}
.modal-body{padding:18px 26px 26px;display:flex;flex-direction:column;gap:14px}
.modal-footer{padding:0 26px 22px;display:flex;justify-content:flex-end;gap:10px}
.form-field label{display:block;font-size:11px;font-weight:500;color:var(--ink-2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13.5px;font-family:var(--font-sans);color:var(--ink);background:var(--white);outline:none;transition:border-color .12s}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-lt)}
/* Bulk bar */
.bulk-bar{background:var(--ink);color:var(--white);padding:10px 20px;display:flex;align-items:center;gap:12px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.1)}
.bulk-bar select{background:rgba(255,255,255,0.12);color:var(--white);border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius);padding:5px 10px;font-size:12px;font-family:var(--font-sans);outline:none}
.bulk-bar select option{background:var(--ink);color:var(--white)}
@media(max-width:700px){.sidebar{display:none}.main{margin-left:0}.content{padding:16px 12px 80px}.topbar{padding:0 16px}}
/* Mobile bottom nav */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--ink);height:64px;z-index:50;border-top:1px solid rgba(255,255,255,0.08);padding-bottom:env(safe-area-inset-bottom)}
.bottom-nav-inner{display:flex;height:100%;align-items:stretch;width:100%;justify-content:space-around}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;color:rgba(255,255,255,0.35);font-size:9px;font-weight:500;font-family:var(--font-sans);letter-spacing:.03em;text-transform:uppercase;cursor:pointer;border:none;background:none;transition:color .15s;padding:0}
.bn-item.active{color:var(--gold)}
.bn-item svg{width:22px;height:22px}
@media(max-width:700px){.sidebar{display:none!important}.main{margin-left:0!important}.content{padding-bottom:80px!important}.bottom-nav{display:flex}}
@media(max-width:700px){.items-table{min-width:unset;width:100%}.items-table thead{display:none}.items-table tbody tr{display:flex;flex-direction:column;padding:12px 16px;border-bottom:1px solid var(--surface-2);gap:8px}.items-table td{padding:0;border:none}.stages{gap:6px;flex-wrap:wrap}.sp{padding:7px 12px;font-size:12px}.overall-badge{align-self:flex-start}.project-header{flex-direction:column;align-items:flex-start;gap:10px;padding:14px 16px}.progress-wrap{width:100%;justify-content:space-between}.progress-bar-bg{flex:1}}
</style>
</head>
<body>
<div class="page-loading" id="page-loading"><div class="spin-lg"></div></div>
<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-name">lyffin</div>
    <div class="sidebar-logo-sub">Ops Platform</div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section">Workspace</div>
    <a class="nav-item" href="dashboard.html">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>Projects
    </a>
    <a class="nav-item active" href="production.html">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 12V6l6-4 6 4v6"/><path d="M6 16v-5h4v5"/><path d="M2 12h12"/></svg>Production
    </a>
    <a class="nav-item" href="qc.html">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M8 1l2 4h4l-3 3 1 4-4-2-4 2 1-4L2 5h4z"/></svg>QC &amp; Complaints
    </a>
    <div class="nav-section" id="nav-admin-section" style="display:none">Admin</div>
    <a class="nav-item" href="admin.html" id="nav-admin" style="display:none">

    </a>
  </div>
  <div class="sidebar-user">
    <div class="user-avatar" id="user-avatar">?</div>

      <div class="user-name" id="user-name">Loading</div>
      <div class="user-role" id="user-role">-</div>
    </div>
    <button class="btn-signout" onclick="signOut()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M11 11l4-4-4-4"/><path d="M15 8H6"/><path d="M6 14H2a1 1 0 01-1-1V3a1 1 0 011-1h4"/></svg>

  </div>
</nav>
<div class="main">
  <div class="topbar">
    <div class="topbar-title">Production</div>
    <div class="topbar-actions">
      <!-- Bulk status update — supervisor/admin only, shown after auth -->
      <div id="bulk-controls" style="display:none;align-items:center;gap:8px">
        <select class="filter-select" id="bulk-project-sel" style="max-width:200px">
          <option value="">Select project…</option>
        </select>
        <select class="filter-select" id="bulk-status-sel">
          <option value="">New status…</option>
          <option value="Structure">Structure</option>
          <option value="Polish">Polish</option>
          <option value="Upholstery">Upholstery</option>
          <option value="Packing">Packing</option>
          <option value="Delivered">Delivered</option>
        </select>
        <button class="btn btn-ghost" onclick="bulkUpdateStatus()" style="height:36px">Apply</button>
      </div>
      <select class="filter-select" id="filter-status" onchange="filterProjects()">
        <option value="">All active projects</option>
        <option value="Structure">Structure</option>
        <option value="Polish">Polish</option>
        <option value="Upholstery">Upholstery</option>
        <option value="Packing">Packing</option>
        <option value="Ready">Ready</option>
      </select>
    </div>
  </div>
  <div class="content">
    <div class="projects-grid" id="projects-grid">
      <div class="empty-state">Loading...</div>
    </div>
  </div>
</div>

<!-- Remark modal -->
<div class="modal-backdrop" id="modal-remark">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add remark</div>
      <button class="modal-close" onclick="closeRemarkModal()">
        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="2" x2="16" y2="16"/><line x1="16" y1="2" x2="2" y2="16"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-field">
        <label id="remark-modal-label">Remark for item</label>
        <textarea id="remark-textarea" placeholder="e.g. Left leg has minor crack — noted for supervisor review…" style="min-height:80px"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeRemarkModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRemark()">Save remark</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut as fbSignOut } from 'https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js';
import { getFirestore, collection, onSnapshot, query, doc, getDoc, updateDoc, getDocs, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyC0aoUyBCHn63-WkJnPFbDJLF0x1GFMyxU",
  authDomain: "lyffin-platform.firebaseapp.com",
  projectId: "lyffin-platform",
  storageBucket: "lyffin-platform.firebasestorage.app",
  messagingSenderId: "618920465280",
  appId: "1:618920465280:web:11ba5583ff3f2b778a2765"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const STAGES = ['carpentry','polish','upholstery','packing','ready'];
const LABELS = {carpentry:'Structure',polish:'Polish',upholstery:'Upholstery',packing:'Packing',ready:'Ready'};
let allData = [];
const itemsCache = {};
let currentRole = 'floor';
let currentUserName = '';
let currentUserUID = '';

// Remark modal state
let _remarkProjectId = null;
let _remarkItemId = null;
let _remarkItemName = '';

onAuthStateChanged(auth, async function(user) {
  if (!user) { window.location.href = 'login.html'; return; }
  const snap = await getDoc(doc(db, 'users', user.uid));
  const data = snap.exists() ? snap.data() : {};
  const name = data.name || user.email.split('@')[0];
  currentRole = data.role || 'floor';
  currentUserName = name;
  currentUserUID = user.uid;

  document.getElementById('user-name').textContent = name;
  document.getElementById('user-role').textContent = currentRole;
  document.getElementById('user-avatar').textContent = name.substring(0,2).toUpperCase();
  if (currentRole === 'admin') {
    document.getElementById('nav-admin-section').style.display = 'block';
    document.getElementById('nav-admin').style.display = 'flex';
    const bnA = document.getElementById('bn-admin');
    if (bnA) bnA.style.display = 'flex';
  }
  // Show bulk controls for supervisor/admin
  if (['admin','supervisor'].includes(currentRole)) {
    document.getElementById('bulk-controls').style.display = 'flex';
  }
  loadProduction(currentRole, name, user.uid);
});

function loadProduction(role, userName, uid) {
  onSnapshot(query(collection(db, 'projects')), function(snap) {
    let projects = snap.docs.map(function(d) { return Object.assign({id:d.id}, d.data()); });
    if (role === 'sales') {
      projects = projects.filter(function(p) {
        return p.assignee === userName || p.assigneeUid === uid;
      });
    }
    window._projects = projects;
    // Populate bulk project selector
    const bulkSel = document.getElementById('bulk-project-sel');
    if (bulkSel) {
      bulkSel.innerHTML = '<option value="">Select project…</option>' +
        projects.filter(p => !['Delivered','Completed'].includes(p.status))
          .map(p => '<option value="' + p.id + '">' + esc(p.projectName||p.id) + '</option>').join('');
    }
    for (let i = 0; i < projects.length; i++) {
      const proj = projects[i];
      if (!itemsCache[proj.id]) {
        itemsCache[proj.id] = [];
        (function(pid) {
          onSnapshot(collection(db, 'projects', pid, 'items'), function(iSnap) {
            itemsCache[pid] = iSnap.docs.map(function(d) { return Object.assign({id:d.id}, d.data()); });
            rebuild();
          });
        })(proj.id);
      }
    }
    rebuild();
    document.getElementById('page-loading').style.display = 'none';
  });
}

function rebuild() {
  const projects = window._projects || [];
  allData = projects
    .map(function(p) { return {project:p, items:itemsCache[p.id]||[]}; })
    .filter(function(d) { return d.items.length > 0; });
  render();
}

function render() {
  const grid = document.getElementById('projects-grid');
  const filter = document.getElementById('filter-status').value;
  const data = filter ? allData.filter(function(d) { return d.project.status === filter; }) : allData;
  if (!data.length) {
    grid.innerHTML = '<div class="empty-state">No production projects found. Push a factory listing to get started.</div>';
    return;
  }
  grid.innerHTML = data.map(function(d) { return renderCard(d); }).join('');
}

function renderCard(d) {
  const project = d.project;
  const items = d.items;
  const total = items.length;
  const ready = items.filter(function(i) { return i.overallStatus === 'Ready'; }).length;
  const pct = total ? Math.round(ready / total * 100) : 0;
  const badgeCls = 'badge-' + (project.status || 'structure').toLowerCase().replace(/\s/g,'');
  const rows = items.map(function(item) { return renderRow(project.id, item); }).join('');
  const pid = project.id.replace(/[^a-z0-9]/gi,'_');
  const isOpen = ready < total;
  return '<div class="project-card">' +
    '<div class="project-header" onclick="toggleProject(\'' + pid + '\')" id="ph-' + pid + '">' +
      '<div style="display:flex;align-items:center;gap:10px">' +
        '<svg class="chevron ' + (isOpen?'open':'') + '" id="chv-' + pid + '" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4 4 4-4"/></svg>' +
        '<div>' +
          '<div class="project-name">' + esc(project.projectName||'') + '</div>' +
          '<div class="project-meta">' + esc(project.location||'') + ' · ' + total + ' items</div>' +
        '</div>' +
      '</div>' +
      '<div class="progress-wrap">' +
        '<span class="badge ' + badgeCls + '">' + (project.status||'Structure') + '</span>' +
        '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>' +
        '<span class="progress-text">' + ready + '/' + total + ' ready</span>' +
      '</div>' +
    '</div>' +
    '<div class="items-wrap ' + (isOpen?'open':'') + '" id="pw-' + pid + '">' +
      '<table class="items-table">' +
        '<thead><tr><th>Product</th><th>Stages</th><th>Status</th><th>Remark</th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +
  '</div>';
}

function renderRow(projectId, item) {
  let pills = '';
  for (let i = 0; i < STAGES.length; i++) {
    const stage = STAGES[i];
    const status = item[stage + 'Status'] || 'pending';
    const isDone = status === 'done';
    const isNA = status === 'na';
    const isPendingApproval = status === 'pending_approval';
    const isStarted = status === 'started';
    const label = LABELS[stage] || stage;

    if (isNA) {
      pills += '<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:4px 8px;border-radius:12px;background:var(--surface-2);color:var(--ink-3)">' +
        label + ': N/A' +
        '<button onclick="undoNA(\'' + projectId + '\',\'' + item.id + '\',\'' + stage + '\',this)" style="font-size:10px;margin-left:3px;background:none;border:none;cursor:pointer;color:var(--ink-3);padding:0" title="Undo N/A">✕</button>' +
        '</span>';
    } else if (isPendingApproval) {
      pills += '<span class="awaiting-approval">⏳ ' + label + ': awaiting approval</span>';
      if (['admin','supervisor'].includes(currentRole)) {
        pills += '<button class="sp-approve" onclick="approveStage(\'' + projectId + '\',\'' + item.id + '\',\'' + stage + '\',this)">✓ Approve</button>';
      }
    } else if (isStarted) {
      // In progress — show coloured pill, tap to mark done
      const cls = 'sp started-' + stage;
      pills += '<button class="' + cls + '" onclick="tap(\'' + projectId + '\',\'' + item.id + '\',\'' + stage + '\',this)">▶ ' + label + '</button>';
    } else {
      const cls = isDone ? ('sp done-' + stage) : 'sp';
      pills += '<button class="' + cls + '" onclick="tap(\'' + projectId + '\',\'' + item.id + '\',\'' + stage + '\',this)">' + (isDone ? '✓ ' : '') + label + '</button>';
      if (!isDone && (stage === 'polish' || stage === 'upholstery')) {
        pills += '<button onclick="markNA(\'' + projectId + '\',\'' + item.id + '\',\'' + stage + '\',this)" style="font-size:10px;padding:3px 6px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--ink-3);cursor:pointer;margin-left:2px;vertical-align:middle" title="Mark as not applicable">N/A</button>';
      }
      // Add a "▶ Start" button for the first pending stage that isn't done/na/started
      if (!isDone) {
        const prevStages = STAGES.slice(0, i);
        const allPrevDoneOrNA = prevStages.every(function(ps) {
          const ps_status = item[ps + 'Status'] || 'pending';
          return ps_status === 'done' || ps_status === 'na';
        });
        if (allPrevDoneOrNA) {
          // This is the current active stage — show Start button if not started
          pills += '<button onclick="startStage(\'' + projectId + '\',\'' + item.id + '\',\'' + stage + '\',this)" style="font-size:10px;padding:3px 8px;border-radius:8px;border:1px solid #f97316;background:#fff7ed;color:#c2410c;cursor:pointer;margin-left:2px;vertical-align:middle" title="Mark as started">▶ Start</button>';
        }
      }
    }
  }

  // Compute overall badge class — handle 'X (In Progress)' states
  let _ovs = item.overallStatus || 'Structure';
  let obCls;
  if (_ovs.includes('(In Progress)')) {
    const base = _ovs.replace(' (In Progress)','').toLowerCase();
    obCls = 'ob-' + base + '-started';
  } else {
    obCls = 'ob-' + _ovs.toLowerCase().replace(/\s/g,'');
  }

  // Audit trail: who last touched this item
  let auditHtml = '';
  if (item.lastMarkedBy && item.lastMarkedAt) {
    const d = item.lastMarkedAt.toDate ? item.lastMarkedAt.toDate() : new Date(item.lastMarkedAt);
    auditHtml = '<div class="audit-info">Last updated by ' + esc(item.lastMarkedBy) + ' · ' + d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}) + '</div>';
  }

  // Remark display
  const remarkHtml = '<button onclick="openRemarkModal(\'' + projectId + '\',\'' + item.id + '\',\'' + esc(item.name||'Item') + '\')" style="font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--ink-3);cursor:pointer;white-space:nowrap">' +
    (item.remark ? '✏ Edit' : '+ Add') +
  '</button>' +
  (item.remark ? '<div class="remark-saved">' + esc(item.remark) + '</div>' : '');

  return '<tr>' +
    '<td>' +
      '<div class="item-name">' + esc(item.name||'Unnamed') + '</div>' +
      '<div class="item-meta">Qty: ' + (item.qty||1) + (item.area ? ' · ' + esc(item.area) : '') + (item.dimensions ? ' · ' + esc(item.dimensions) : '') + '</div>' +
      (item.details ? '<div class="item-meta" style="font-style:italic">' + esc(item.details) + '</div>' : '') +
      ((item.finishes && item.finishes.length) ? '<div class="item-meta">Finish: ' + item.finishes.filter(Boolean).map(esc).join(', ') + '</div>' : '') +
      ((item.upholstery && item.upholstery.length) ? '<div class="item-meta">Upholstery: ' + item.upholstery.filter(Boolean).map(esc).join(', ') + '</div>' : '') +
      auditHtml +
    '</td>' +
    '<td><div class="stages">' + pills + '</div></td>' +
    '<td><span class="overall-badge ' + obCls + '">' + (item.overallStatus||'Structure').replace(' (In Progress)',' ▶') + '</span></td>' +
    '<td>' + remarkHtml + '</td>' +
  '</tr>';
}

// ── STAGE ACTIONS ──────────────────────────────────────────────────────────

window.tap = async function(projectId, itemId, stage, btn) {
  if (btn.disabled) return;
  btn.disabled = true;
  try {
    const itemRef = doc(db, 'projects', projectId, 'items', itemId);
    const snap = await getDoc(itemRef);
    if (!snap.exists()) { showToast('Item not found'); btn.disabled = false; return; }
    const item = snap.data();
    const current = item[stage + 'Status'] || 'pending';

    // Tap cycles: pending → started (floor) / pending → done (supervisor+)
    //             started → pending_approval (floor) / started → done (supervisor+)
    //             pending_approval → pending (undo, any)
    //             done → pending (undo, any)
    let next;
    if (current === 'done') {
      next = 'pending'; // undo
    } else if (current === 'started') {
      // Already started — mark complete
      if (['floor'].includes(currentRole) && stage !== 'ready') {
        next = 'pending_approval';
      } else {
        next = 'done';
      }
    } else {
      // pending or pending_approval — first tap starts it, second tap completes
      if (['floor'].includes(currentRole) && stage !== 'ready') {
        next = 'pending_approval';
      } else {
        next = 'done';
      }
    }

    const updates = {};
    updates[stage + 'Status'] = next;
    updates.lastMarkedBy = currentUserName;
    updates.lastMarkedAt = serverTimestamp();

    // Record audit trail in stageAudit map
    const auditKey = 'audit_' + stage;
    updates[auditKey] = { by: currentUserName, uid: currentUserUID, at: new Date().toISOString(), status: next };

    const valid = STAGES.filter(function(s) { return item[s + 'Status'] !== 'na'; });
    const sim = Object.assign({}, item, updates);
    // For overall status, pending_approval counts as "not done yet"
    const firstPending = valid.find(function(s) {
      const st = sim[s + 'Status'] || 'pending';
      return st === 'pending' || st === 'pending_approval';
    });
    const firstStarted = !firstPending && valid.find(function(s) {
      return (sim[s + 'Status'] || 'pending') === 'started';
    });
    if (firstStarted) {
      updates.overallStatus = LABELS[firstStarted] + ' (In Progress)';
    } else {
      updates.overallStatus = firstPending ? LABELS[firstPending] : 'Ready';
    }
    if (updates.overallStatus === 'Ready') updates[stage + 'Status'] = 'done'; // if all done, commit directly

    await updateDoc(itemRef, updates);

    // Log activity
    await logActivity(projectId, next === 'pending_approval'
      ? currentUserName + ' completed ' + LABELS[stage] + ' on ' + (item.name||'item') + ' — awaiting supervisor approval'
      : next === 'done'
        ? currentUserName + ' marked ' + LABELS[stage] + ' done on ' + (item.name||'item')
        : currentUserName + ' undid ' + LABELS[stage] + ' on ' + (item.name||'item')
    );

    if (next === 'pending_approval') {
      showToast(LABELS[stage] + ' submitted — awaiting supervisor approval');
    } else {
      showToast(next === 'done' ? (LABELS[stage] + ' complete') : (LABELS[stage] + ' undone'));
    }

    // Check if all items ready → update project status
    const allSnap = await getDocs(collection(db, 'projects', projectId, 'items'));
    const allReady = allSnap.docs.every(function(d) {
      const data = d.data();
      if (d.id === itemId) return updates.overallStatus === 'Ready';
      return data.overallStatus === 'Ready';
    });
    if (allReady) {
      await updateDoc(doc(db, 'projects', projectId), {status:'Packing'});
      await logActivity(projectId, 'All items ready — project moved to Packing');
    }
  } catch(e) {
    console.error(e);
    showToast('Error: ' + e.message);
  } finally {
    btn.disabled = false;
  }
};

window.startStage = async function(projectId, itemId, stage, btn) {
  if (btn.disabled) return;
  btn.disabled = true;
  try {
    const itemRef = doc(db, 'projects', projectId, 'items', itemId);
    const snap = await getDoc(itemRef);
    if (!snap.exists()) { btn.disabled = false; return; }
    const item = snap.data();
    const updates = {};
    updates[stage + 'Status'] = 'started';
    updates.lastMarkedBy = currentUserName;
    updates.lastMarkedAt = serverTimestamp();
    // Overall status: label + ' (In Progress)'
    updates.overallStatus = LABELS[stage] + ' (In Progress)';
    await updateDoc(itemRef, updates);
    await logActivity(projectId, currentUserName + ' started ' + LABELS[stage] + ' on ' + (item.name||'item'));
    showToast(LABELS[stage] + ' started');
  } catch(e) { showToast('Error: ' + e.message); }
  finally { btn.disabled = false; }
};

window.approveStage = async function(projectId, itemId, stage, btn) {
  if (btn.disabled) return;
  btn.disabled = true;
  try {
    const itemRef = doc(db, 'projects', projectId, 'items', itemId);
    const snap = await getDoc(itemRef);
    if (!snap.exists()) { btn.disabled = false; return; }
    const item = snap.data();
    const updates = {};
    updates[stage + 'Status'] = 'done';
    updates.lastMarkedBy = currentUserName;
    updates.lastMarkedAt = serverTimestamp();
    updates['audit_' + stage] = { by: currentUserName, uid: currentUserUID, at: new Date().toISOString(), status: 'approved' };

    const valid = STAGES.filter(s => item[s + 'Status'] !== 'na');
    const sim = Object.assign({}, item, updates);
    const firstPending = valid.find(s => { const st = sim[s + 'Status'] || 'pending'; return st === 'pending' || st === 'pending_approval'; });
    const firstStarted2 = !firstPending && valid.find(s => (sim[s + 'Status'] || 'pending') === 'started');
    updates.overallStatus = firstStarted2 ? LABELS[firstStarted2] + ' (In Progress)' : (firstPending ? LABELS[firstPending] : 'Ready');
    await updateDoc(itemRef, updates);
    await logActivity(projectId, currentUserName + ' approved ' + LABELS[stage] + ' for ' + (item.name||'item'));
    showToast(LABELS[stage] + ' approved');
  } catch(e) { showToast('Error: ' + e.message); }
  finally { btn.disabled = false; }
};

window.undoNA = async function(projectId, itemId, stage, btn) {
  if (btn.disabled) return;
  btn.disabled = true;
  try {
    const itemRef = doc(db, 'projects', projectId, 'items', itemId);
    const snap = await getDoc(itemRef);
    if (!snap.exists()) { btn.disabled = false; return; }
    const item = snap.data();
    const updates = {};
    updates[stage + 'Status'] = 'pending';
    updates.lastMarkedBy = currentUserName;
    updates.lastMarkedAt = serverTimestamp();
    const sim = Object.assign({}, item, updates);
    const valid = STAGES.filter(s => sim[s + 'Status'] !== 'na');
    const firstPending = valid.find(s => { const st = sim[s + 'Status'] || 'pending'; return st === 'pending' || st === 'pending_approval'; });
    const firstStarted3 = !firstPending && valid.find(s => (sim[s + 'Status'] || 'pending') === 'started');
    updates.overallStatus = firstStarted3 ? LABELS[firstStarted3] + ' (In Progress)' : (firstPending ? LABELS[firstPending] : 'Ready');
    await updateDoc(itemRef, updates);
    showToast(LABELS[stage] + ' restored to pending');
  } catch(e) { showToast('Error: ' + e.message); }
  finally { btn.disabled = false; }
};

window.markNA = async function(projectId, itemId, stage, btn) {
  if (btn.disabled) return;
  const stageLabel = LABELS[stage] || stage;
  if (!confirm('Mark ' + stageLabel + ' as N/A for this item?\n\nThis means this item does not require ' + stageLabel + '.')) return;
  btn.disabled = true;
  try {
    const itemRef = doc(db, 'projects', projectId, 'items', itemId);
    const snap = await getDoc(itemRef);
    if (!snap.exists()) { btn.disabled = false; return; }
    const item = snap.data();
    const updates = {};
    updates[stage + 'Status'] = 'na';
    updates.lastMarkedBy = currentUserName;
    updates.lastMarkedAt = serverTimestamp();
    const valid = STAGES.filter(s => item[s + 'Status'] !== 'na' && s !== stage);
    const sim = Object.assign({}, item, updates);
    const firstPending = valid.find(s => (sim[s + 'Status'] || 'pending') === 'pending');
    updates.overallStatus = firstPending ? LABELS[firstPending] : 'Ready';
    await updateDoc(itemRef, updates);
    showToast(stageLabel + ' marked as N/A');
  } catch(e) { showToast('Error: ' + e.message); }
  finally { btn.disabled = false; }
};

// ── REMARK MODAL ──────────────────────────────────────────────────────────
window.openRemarkModal = function(projectId, itemId, itemName) {
  _remarkProjectId = projectId;
  _remarkItemId = itemId;
  _remarkItemName = itemName;
  // Pre-fill with existing remark
  const cachedItems = itemsCache[projectId] || [];
  const item = cachedItems.find(i => i.id === itemId);
  document.getElementById('remark-modal-label').textContent = 'Remark for: ' + itemName;
  document.getElementById('remark-textarea').value = (item && item.remark) ? item.remark : '';
  document.getElementById('modal-remark').classList.add('open');
};

window.closeRemarkModal = function() {
  document.getElementById('modal-remark').classList.remove('open');
  _remarkProjectId = null; _remarkItemId = null;
};

window.saveRemark = async function() {
  if (!_remarkProjectId || !_remarkItemId) return;
  const remark = document.getElementById('remark-textarea').value.trim();
  try {
    await updateDoc(doc(db, 'projects', _remarkProjectId, 'items', _remarkItemId), {
      remark,
      remarkBy: currentUserName,
      remarkAt: serverTimestamp()
    });
    await logActivity(_remarkProjectId, currentUserName + ' added remark on ' + _remarkItemName + ': ' + (remark || '(cleared)'));
    closeRemarkModal();
    showToast('Remark saved');
  } catch(e) { showToast('Error: ' + e.message); }
};

// ── BULK STATUS UPDATE ────────────────────────────────────────────────────
window.bulkUpdateStatus = async function() {
  const projectId = document.getElementById('bulk-project-sel').value;
  const newStatus = document.getElementById('bulk-status-sel').value;
  if (!projectId || !newStatus) { showToast('Select a project and status'); return; }
  const projName = (window._projects||[]).find(p=>p.id===projectId)?.projectName || projectId;
  if (!confirm('Change status of "' + projName + '" to ' + newStatus + '?')) return;
  try {
    await updateDoc(doc(db, 'projects', projectId), { status: newStatus, updatedAt: serverTimestamp() });
    await logActivity(projectId, currentUserName + ' bulk-updated project status to ' + newStatus);
    showToast(projName + ' → ' + newStatus);
  } catch(e) { showToast('Error: ' + e.message); }
};

// ── ACTIVITY LOG ──────────────────────────────────────────────────────────
async function logActivity(projectId, message) {
  try {
    await addDoc(collection(db, 'projects', projectId, 'activity'), {
      message,
      by: currentUserName,
      uid: currentUserUID,
      at: serverTimestamp()
    });
  } catch(e) { /* non-critical */ }
}

window.toggleProject = function(pid) {
  const wrap = document.getElementById('pw-' + pid);
  const chv = document.getElementById('chv-' + pid);
  if (!wrap) return;
  const isOpen = wrap.classList.contains('open');
  wrap.classList.toggle('open', !isOpen);
  if (chv) chv.classList.toggle('open', !isOpen);
};

window.filterProjects = function() { render(); };
window.signOut = async function() { await fbSignOut(auth); window.location.href = 'login.html'; };

function esc(s) {
  return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}
